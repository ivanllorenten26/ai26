# rule-index.yaml
# Maps coding rule IDs to the recipe files that document them.
#
# This is plugin metadata — identical for all teams using this plugin.
# It does NOT belong in ai26/config.yaml (which is project-specific config).
#
# Rule IDs must match coding_rules in ai26/config.yaml.
# Recipe filenames must match files in this directory (docs/coding-standards/recipes/).
#
# Consumed by: scripts/generate-coding-rules-doc.sh
# Validated by: scripts/validate-coding-rules.sh (bidirectional check against front matter)

